name: CD — Build, Push to ECR, Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag to deploy (defaults to short SHA)'
        required: false

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: icop-dev-cluster

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: mvn clean package -DskipTests -q

      - name: Build and push API Gateway
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/api-gateway:$IMAGE_TAG \
            -f api-gateway/Dockerfile .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/api-gateway:$IMAGE_TAG

      - name: Build and push User Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/user-service:$IMAGE_TAG \
            -f user-service/Dockerfile .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/user-service:$IMAGE_TAG

      - name: Build and push Order Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/order-service:$IMAGE_TAG \
            -f order-service/Dockerfile .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/order-service:$IMAGE_TAG

      - name: Build and push Payment Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/payment-service:$IMAGE_TAG \
            -f payment-service/Dockerfile .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/payment-service:$IMAGE_TAG

      - name: Build and push Notification Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/notification-service:$IMAGE_TAG \
            -f notification-service/Dockerfile .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/notification-service:$IMAGE_TAG

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.17.0'

      - name: Deploy API Gateway
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          helm upgrade --install api-gateway helm/api-gateway \
            --namespace icop --create-namespace \
            --set image.repository=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/api-gateway \
            --set image.tag=$IMAGE_TAG \
            --set env.JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --wait --timeout 5m

      - name: Deploy User Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          helm upgrade --install user-service helm/user-service \
            --namespace icop \
            --set image.repository=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/user-service \
            --set image.tag=$IMAGE_TAG \
            --set env.SPRING_DATASOURCE_URL=${{ secrets.DB_URL_USER }} \
            --set env.SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set env.SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BROKERS }} \
            --set env.JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --wait --timeout 5m

      - name: Deploy Order Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          helm upgrade --install order-service helm/order-service \
            --namespace icop \
            --set image.repository=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/order-service \
            --set image.tag=$IMAGE_TAG \
            --set env.SPRING_DATASOURCE_URL=${{ secrets.DB_URL_ORDER }} \
            --set env.SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set env.SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BROKERS }} \
            --wait --timeout 5m

      - name: Deploy Payment Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          helm upgrade --install payment-service helm/payment-service \
            --namespace icop \
            --set image.repository=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/payment-service \
            --set image.tag=$IMAGE_TAG \
            --set env.SPRING_DATASOURCE_URL=${{ secrets.DB_URL_PAYMENT }} \
            --set env.SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set env.SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BROKERS }} \
            --wait --timeout 5m

      - name: Deploy Notification Service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          helm upgrade --install notification-service helm/notification-service \
            --namespace icop \
            --set image.repository=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_PREFIX }}/notification-service \
            --set image.tag=$IMAGE_TAG \
            --set env.SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BROKERS }} \
            --wait --timeout 5m

      - name: Verify deployment
        run: kubectl get pods -n icop
