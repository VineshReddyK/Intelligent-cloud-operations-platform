  namespace: icop
  labels:
    app.kubernetes.io/part-of: icop-platform
spec:
  targetService: order-service
  minReplicas: 2
  maxReplicas: 8
  aiServiceUrl: http://ai-service:8085
  scalingRules:
    lowRiskReplicas: 2
    mediumRiskReplicas: 3
    highRiskReplicas: 6
    criticalRiskReplicas: 8

---
apiVersion: icop.io/v1alpha1
