apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: intelligentscalingpolicies.icop.io
  labels:
    app.kubernetes.io/part-of: icop-platform
spec:
  group: icop.io
  names:
    kind: IntelligentScalingPolicy
    listKind: IntelligentScalingPolicyList
    plural: intelligentscalingpolicies
    singular: intelligentscalingpolicy
    shortNames:
      - isp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetService]
              properties:
                targetService:
                  type: string
                  description: Name of the ICOP microservice Deployment to manage
                minReplicas:
                  type: integer
                  minimum: 1
                  default: 1
                maxReplicas:
                  type: integer
                  minimum: 1
                  default: 10
                aiServiceUrl:
                  type: string
                  default: "http://ai-service:8085"
                  description: Base URL of the ICOP AI service
                scalingRules:
                  type: object
                  properties:
                    lowRiskReplicas:
                      type: integer
                      minimum: 1
                      default: 2
                    mediumRiskReplicas:
                      type: integer
                      minimum: 1
                      default: 3
                    highRiskReplicas:
                      type: integer
                      minimum: 1
                      default: 6
                    criticalRiskReplicas:
                      type: integer
                      minimum: 1
                      default: 10
            status:
              type: object
              properties:
                currentReplicas:
                  type: integer
                desiredReplicas:
                  type: integer
                riskLevel:
                  type: string
                  enum: [LOW, MEDIUM, HIGH, CRITICAL, UNKNOWN]
                lastScaledAt:
                  type: string
                reason:
                  type: string
                observedGeneration:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Target
          type: string
          jsonPath: .spec.targetService
        - name: Risk
          type: string
          jsonPath: .status.riskLevel
        - name: Replicas
          type: integer
          jsonPath: .status.currentReplicas
        - name: Last Scaled
          type: string
          jsonPath: .status.lastScaledAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
