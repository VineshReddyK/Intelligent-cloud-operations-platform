replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: icop.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Non-sensitive configuration
env:
  USER_SERVICE_URL: "http://user-service:8081"
  ORDER_SERVICE_URL: "http://order-service:8082"
  PAYMENT_SERVICE_URL: "http://payment-service:8083"
  ALLOWED_ORIGINS: "https://icop.example.com"

# Sensitive values — set at deploy time via: --set sensitiveEnv.JWT_SECRET=<value>
# Never commit real values here.
sensitiveEnv:
  JWT_SECRET: ""

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: management
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: management
  initialDelaySeconds: 30
  periodSeconds: 10
