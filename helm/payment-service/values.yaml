replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8083

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Non-sensitive configuration
env:
  SPRING_DATASOURCE_URL: ""
  SPRING_DATASOURCE_USERNAME: "icop"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: ""

# Sensitive values — set at deploy time via: --set sensitiveEnv.SPRING_DATASOURCE_PASSWORD=<value>
sensitiveEnv:
  SPRING_DATASOURCE_PASSWORD: ""

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: management
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: management
  initialDelaySeconds: 30
  periodSeconds: 10
