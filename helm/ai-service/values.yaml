replicaCount: 1

image:
  repository: ai-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8085

# Non-sensitive configuration
env:
  SPRING_PROFILES_ACTIVE: kubernetes
  SPRING_DATASOURCE_URL: ""
  SPRING_DATASOURCE_USERNAME: "icop"
  PROMETHEUS_URL: http://icop-observability-prometheus:9090
  OTEL_EXPORTER_OTLP_ENDPOINT: http://icop-otel-collector:4318

# Sensitive values — set at deploy time via: --set sensitiveEnv.SPRING_DATASOURCE_PASSWORD=<value>
sensitiveEnv:
  SPRING_DATASOURCE_PASSWORD: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: management
  initialDelaySeconds: 90
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: management
  initialDelaySeconds: 90
  periodSeconds: 15
