server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
            container_name: attrs.name
      - json:
          source: log
          expressions:
            message: message
            level: level
            logger: logger_name
            service: spring.application.name
            traceId: traceId
            spanId: spanId
      - labels:
          stream:
          level:
          service:
          traceId:
          spanId:
      - output:
          source: message
      - timestamp:
          source: time
          format: RFC3339Nano
