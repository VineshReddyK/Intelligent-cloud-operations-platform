global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: icop
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: api-gateway

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8081"]
    relabel_configs:
      - target_label: service
        replacement: user-service

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8082"]
    relabel_configs:
      - target_label: service
        replacement: order-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payment-service:8083"]
    relabel_configs:
      - target_label: service
        replacement: payment-service

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8084"]
    relabel_configs:
      - target_label: service
        replacement: notification-service

  - job_name: ai-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ai-service:8085"]
    relabel_configs:
      - target_label: service
        replacement: ai-service

  - job_name: k8s-operator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["k8s-operator:8086"]
    relabel_configs:
      - target_label: service
        replacement: k8s-operator
