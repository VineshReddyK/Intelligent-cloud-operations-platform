server:
  port: 8085

spring:
  application:
    name: ai-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_db}
    username: ${SPRING_DATASOURCE_USERNAME:icop}
    password: ${SPRING_DATASOURCE_PASSWORD:icop_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

prometheus:
  url: ${PROMETHEUS_URL:http://localhost:9090}

ai:
  anomaly:
    window-size: 60
    z-score-threshold: 2.5
    poll-interval-ms: 30000
  prediction:
    high-risk-threshold: 70
    critical-threshold: 90

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.icop: DEBUG
    ai.djl: INFO
